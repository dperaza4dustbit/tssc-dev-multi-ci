apiVersion: tekton.dev/v1
kind: Task
metadata:
  labels:
    app.kubernetes.io/version: "0.1"
    build.appstudio.redhat.com/build_type: docker
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: containers, tssc
  name: build-workload
spec:
  description: |-
    Builds source code into a container image and pushes the image into container registry using buildah tool.
    In addition it generates a SBOM file, injects the SBOM file into final container image and pushes the SBOM file as separate image using cosign tool.
  params:
    - description: Reference of the image buildah will produce.
      name: IMAGE
      type: string
    - default: ./Dockerfile
      description: Path to the Dockerfile to build.
      name: DOCKERFILE
      type: string
    - default: .
      description: Path to the directory to use as context.
      name: CONTEXT
      type: string
    - default: "true"
      description: Verify the TLS on the registry endpoint (for push/pull to a non-TLS registry)
      name: TLSVERIFY
      type: string
    - name: BUILD_ARGS
      description: Array of --build-arg values ("arg=value" strings)
      type: array
      default: []
    - name: BUILD_ARGS_FILE
      description: Path to a file with build arguments, see https://www.mankier.com/1/buildah-build#--build-arg-file
      type: string
      default: ""
    - name: STORAGE_DRIVER
      description: Storage driver to configure for buildah
      type: string
      default: vfs
  results:
    - description: Digest of the image just built
      name: IMAGE_DIGEST
    - description: Image repository and tag where the built image was pushed
      name: IMAGE_URL
    - description: Digests of the base images used for build
      name: BASE_IMAGES_DIGESTS
    - description: Link to the SBOM layer pushed to the registry as part of an OCI artifact.
      name: SBOM_BLOB_URL
  stepTemplate:
    env:
      - name: STORAGE_DRIVER
        value: $(params.STORAGE_DRIVER)
      - name: CONTEXT
        value: $(params.CONTEXT)
      - name: DOCKERFILE
        value: $(params.DOCKERFILE)
      - name: IMAGE
        value: $(params.IMAGE)
      - name: TLSVERIFY
        value: $(params.TLSVERIFY)
      - name: BUILD_ARGS_FILE
        value: $(params.BUILD_ARGS_FILE)
      - name: _BUILDAH_STARTED_IN_USERNS
        value: ""
      - name: BUILDAH_ISOLATION
        value: chroot
      - name: ROX_CENTRAL_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: $(params.rox-secret-name)
            key: rox-api-endpoint
      - name: ROX_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: $(params.rox-secret-name)
            key: rox-api-token
      - name: GITOPS_AUTH_PASSWORD
        valueFrom:
          secretKeyRef:
            name: $(params.gitops-secret-name)
            key: password
  steps:
    - name: init
      image: quay.io/redhat-appstudio/rhtap-task-runner:latest
      args:
        - $(params.BUILD_ARGS[*])
      script: |
        echo "• init"
        env
        pwd
        cd ./source
        pwd
        ls -la
        /work/tssc/init.sh
      securityContext:
        capabilities:
          add:
            # this is needed so that buildah can write to the mounted /var/lib/containers directory
            - SETFCAP
      volumeMounts:
        - mountPath: /var/lib/containers
          name: varlibcontainers
        - mountPath: /tmp/files
          name: tmpfiles
      workingDir: $(workspaces.source.path)
      imagePullPolicy: Always
  volumes:
    - emptyDir: {}
      name: varlibcontainers
    - emptyDir: {}
      name: tmpfiles
  workspaces:
    - name: source
      description: Workspace containing the source code to build.
